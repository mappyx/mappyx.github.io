<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}{% if page.title %} | {% endif %}{{ site.name }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">

  {% include meta.html %}
</head>

<body>
  <header class="navbar">
    <div class="container nav-container">
      <a href="{{ site.baseurl }}/" class="logo">
        <span class="logo-dot"></span> {{ site.name }}
      </a>
      <nav class="nav-links">
        <a href="#hero">Inicio</a>
        <a href="#about">Sobre mí</a>
        <a href="#experience">Experiencia</a>
        <a href="#skills">Habilidades</a>
        <a href="mailto:rafael.paez.v@gmail.com" class="nav-cta">Contacto</a>
      </nav>
      <button class="mobile-toggle" aria-label="Menu">
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-info">
        <h3>{{ site.name }}</h3>
        <p>{{ site.description }}</p>
      </div>
      <div class="footer-socials">
        <a href="https://linkedin.com/in/{{ site.footer-links.linkedin }}" target="_blank"><i
            class="fab fa-linkedin"></i></a>
        <a href="https://github.com/{{ site.footer-links.github }}" target="_blank"><i class="fab fa-github"></i></a>
      </div>
      <p class="copyright">&copy; {{ site.time | date: '%Y' }} | Hecho con ❤️ para el mundo.</p>
    </div>
  </footer>

  <!-- Reveal on Scroll Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observerOptions = { threshold: 0.1 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal-visible');
          }
        });
      }, observerOptions);

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

      // Mobile menu toggle
      const mobileToggle = document.querySelector('.mobile-toggle');
      const navLinks = document.querySelector('.nav-links');
      mobileToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        mobileToggle.classList.toggle('active');
      });
    });
  </script>
</body>

</html>
