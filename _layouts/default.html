<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}{% if page.title %} | {% endif %}{{ site.name }}</title>

  <!-- Fonts: Inter for Material feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">

  <style>
    /* Immediate critical styles to prevent flash of unstyled content */
    body.loading {
      background-color: #f4f6f8;
      opacity: 0;
    }

    body.loaded {
      opacity: 1;
      transition: opacity 0.4s ease-in;
    }
  </style>
</head>

<body class="loading">
  <header class="navbar">
    <div class="nav-container">
      <a href="{{ site.baseurl }}/" class="logo">
        <div class="logo-icon">
          <i class="fas fa-code"></i>
        </div>
        <span>{{ site.name }}</span>
      </a>

      <nav class="nav-links">
        <a href="#hero" class="nav-item active">Dashboard</a>
        <a href="#experience" class="nav-item">Experiencia</a>
        <a href="#skills" class="nav-item">Habilidades</a>
        <a href="mailto:rafael.paez.v@gmail.com" class="btn btn-light" style="margin-left: 1rem;">
          <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Contactar
        </a>
      </nav>

      <div class="mobile-nav-toggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-socials">
        <a href="https://linkedin.com/in/{{ site.footer-links.linkedin }}" class="social-icon" target="_blank"><i
            class="fab fa-linkedin-in"></i></a>
        <a href="https://github.com/{{ site.footer-links.github }}" class="social-icon" target="_blank"><i
            class="fab fa-github"></i></a>
        <a href="mailto:rafael.paez.v@gmail.com" class="social-icon"><i class="fas fa-envelope"></i></a>
      </div>
      <p style="color: var(--text-hint); font-weight: 500;">
        © {{ site.time | date: '%Y' }} {{ site.name }} | Built with Berry Aesthetic
      </p>
    </div>
  </footer>

  <!-- Reveal Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.remove('loading');
      document.body.classList.add('loaded');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

      // Simple active state toggle for nav
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          navItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
        });
      });
    });
  </script>
</body>

</html>
